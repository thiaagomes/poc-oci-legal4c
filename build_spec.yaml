version: 0.1
component: build
timeoutInSeconds: 3600
runAs: root
shell: bash

env:
  variables:
    OCIR_REGISTRY: "ord.ocir.io"
    OCIR_NAMESPACE: "axn0sp6l8tzt"
    OCIR_REPO: "poc-oci-legal4c"

  vaultVariables:
    OCIR_USERNAME: "ocid1.vaultsecret.oc1.us-chicago-1.amaaaaaamnxd4byamfbgn4awpsnqfrs7axx2epu6bgrlqqv3kucexfeqcjsa"
    OCIR_AUTH_TOKEN: "ocid1.vaultsecret.oc1.us-chicago-1.amaaaaaamnxd4byaoofxn3fvn3537rnxjy4dbeb55fbzdzfqltye6j7a5mqa"

steps:
  - type: Command
    name: "Docker login to OCIR"
    timeoutInSeconds: 600
    command: |
      set -eo pipefail
      echo "${OCIR_AUTH_TOKEN}" | docker login "${OCIR_REGISTRY}" -u "${OCIR_USERNAME}" --password-stdin

  - type: Command
    name: "Build + tag image"
    timeoutInSeconds: 1800
    command: |
      set -eo pipefail
      IMAGE="${OCIR_REGISTRY}/${OCIR_NAMESPACE}/${OCIR_REPO}"
      TAG="${OCI_BUILD_RUN_ID}"

      docker build -t "${IMAGE}:${TAG}" .
      docker tag "${IMAGE}:${TAG}" "${IMAGE}:latest"

  - type: Command
    name: "Push image to OCIR"
    timeoutInSeconds: 1800
    command: |
      set -eo pipefail
      IMAGE="${OCIR_REGISTRY}/${OCIR_NAMESPACE}/${OCIR_REPO}"
      TAG="${OCI_BUILD_RUN_ID}"

      docker push "${IMAGE}:${TAG}"
      docker push "${IMAGE}:latest"